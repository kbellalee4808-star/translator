<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bella · Brand Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B3A5C;
    --navy-deep: #112640;
    --gold: #D4A94A;
    --gold-light: #E8C97A;
    --ivory: #FAF7F2;
    --ivory-dark: #F0EBE3;
    --text: #2C2C2C;
    --muted: #8A8A8A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--navy-deep);
    color: var(--ivory);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px env(safe-area-inset-bottom);
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .overline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 0.15em;
    display: block;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 28px;
    color: var(--ivory);
    letter-spacing: 0.04em;
  }

  h1 span {
    color: var(--gold);
  }

  .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.05em;
    word-break: keep-all;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,169,74,0.2);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Cormorant Garamond', serif;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ivory);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    resize: none;
    min-height: 80px;
    word-break: keep-all;
  }

  textarea::placeholder {
    color: rgba(250,247,242,0.25);
    font-style: italic;
  }

  .mode-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    max-width: 480px;
    width: 100%;
  }

  .mode-btn {
    flex: 1;
    min-width: 0;
    padding: 9px 8px;
    border-radius: 8px;
    border: 1px solid rgba(212,169,74,0.25);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .mode-btn.active {
    background: rgba(212,169,74,0.15);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  .btn-translate {
    width: 100%;
    max-width: 480px;
    padding: 16px;
    background: var(--gold);
    color: var(--navy-deep);
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    margin-bottom: 16px;
  }

  .btn-translate:hover { background: var(--gold-light); }
  .btn-translate:disabled { opacity: 0.5; cursor: not-allowed; }

  .result-card {
    width: 100%;
    max-width: 480px;
    display: none;
  }

  .result-card.visible { display: block; }

  .result-box {
    background: rgba(212,169,74,0.07);
    border: 1px solid rgba(212,169,74,0.3);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 12px;
    position: relative;
  }

  .result-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    font-family: 'Cormorant Garamond', serif;
  }

  .result-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--ivory);
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .copy-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(212,169,74,0.15);
    border: 1px solid rgba(212,169,74,0.3);
    border-radius: 6px;
    color: var(--gold);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }

  .copy-btn:hover { background: rgba(212,169,74,0.25); }
  .copy-btn.copied { color: #7EC8A0; border-color: #7EC8A0; background: rgba(126,200,160,0.1); }

  .loading {
    display: none;
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }

  .loading.visible { display: block; }

  .wave {
    display: inline-block;
    animation: wave 1.4s infinite;
  }
  @keyframes wave {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .divider {
    width: 40px;
    height: 1px;
    background: rgba(212,169,74,0.3);
    margin: 0 auto 28px;
  }

  @media (max-width: 520px) {
    h1 { font-size: 24px; }
    .card, .btn-translate, .result-card { max-width: 100%; }
    body { padding: 28px 16px env(safe-area-inset-bottom); }
  }
</style>
</head>
<body>

<header>
  <span class="overline">@bellaleeon · Global Content</span>
  <h1>Brand <span>Translator</span></h1>
  <p class="subtitle">한국어로 쓰면 벨라 컨셉에 맞는 영어로 바꿔드립니다</p>
</header>

<div class="divider"></div>

<!-- Mode selector -->
<div class="mode-row">
  <button class="mode-btn active" data-mode="status">💬 상태메시지</button>
  <button class="mode-btn" data-mode="caption">📸 캡션</button>
  <button class="mode-btn" data-mode="bio">✨ 바이오</button>
  <button class="mode-btn" data-mode="reel">🎬 릴스 훅</button>
</div>

<!-- Input -->
<div class="card">
  <div class="card-label">Korean Input</div>
  <textarea id="input" placeholder="한국어로 써주세요&#10;예) 퇴사 후 지구 반대편으로 출근 중" rows="4"></textarea>
</div>

<button class="btn-translate" id="translateBtn" onclick="translate()">
  ✈️ &nbsp;영어로 변환하기
</button>

<!-- Loading -->
<div class="loading" id="loading">
  <span class="wave">✦</span>&nbsp; 벨라 감성으로 번역 중...
</div>

<!-- Result -->
<div class="result-card" id="resultCard">
  <div class="result-box" id="enBox">
    <div class="result-label">English · Brand Version</div>
    <button class="copy-btn" onclick="copyText('enText', this)">copy</button>
    <div class="result-text" id="enText"></div>
  </div>
  <div class="result-box" id="comboBox">
    <div class="result-label">Korean + English · Combo</div>
    <button class="copy-btn" onclick="copyText('comboText', this)">copy</button>
    <div class="result-text" id="comboText"></div>
  </div>
</div>

<script>
  let currentMode = 'status';

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      updatePlaceholder();
    });
  });

  function updatePlaceholder() {
    const placeholders = {
      status: '예) 퇴사 후 지구 반대편으로 출근 중',
      caption: '예) 오늘도 바다 위에서 하루를 시작했다',
      bio: '예) 7급 공무원 그만두고 크루즈 노마드로 살고 있습니다',
      reel: '예) 퇴사하고 1년, 이렇게 달라졌습니다'
    };
    document.getElementById('input').placeholder = `한국어로 써주세요\n${placeholders[currentMode]}`;
  }

  const SYSTEM_PROMPTS = {
    status: `You are a brand copywriter for @bellaleeon — a Korean cruise nomad and former civil servant who quit her government job to live freely traveling the world on cruise ships.

Her brand identity: witty, concise, punchy, aspirational. Themes: freedom, ocean, travel, letting go, living differently.

The user gives you Korean text (a KakaoTalk status message). Your job:
1. Write an English version that captures her brand voice — short, memorable, with light wit
2. Write a combo version: Korean first, then English below

Rules:
- Keep it SHORT (1-2 lines max)
- No clichés like "living my best life" or "blessed"
- Match the energy of "Quit my job. Now I commute to the other side of the globe."
- Return ONLY valid JSON, no markdown, no explanation

Format exactly:
{"en": "English version here", "combo": "한국어 버전\nEnglish version here"}`,

    caption: `You are a brand copywriter for @bellaleeon — Korean cruise nomad, former civil servant, global content creator.

The user gives Korean text for an Instagram caption. Write:
1. English brand caption (2-4 lines, conversational but polished)
2. Combo: Korean original + line break + English

Brand voice: honest, free-spirited, slightly cinematic. Like someone living the life others dream about, but without bragging.

Return ONLY valid JSON:
{"en": "English caption here", "combo": "한국어 캡션\n\nEnglish caption here"}`,

    bio: `You are a brand copywriter for @bellaleeon — Korean cruise nomad, former Level 7 civil servant turned digital nomad, Instagram creator going global.

The user gives Korean bio text. Rewrite in English as a compelling Instagram bio.

Rules:
- Max 3-4 short lines
- Start with identity, then lifestyle, then hook
- No emoji overload (1-2 max)
- Punchy and specific

Return ONLY valid JSON:
{"en": "English bio here", "combo": "한국어 바이오\n\nEnglish bio here"}`,

    reel: `You are a brand copywriter for @bellaleeon — Korean cruise nomad, former civil servant, going global on Instagram.

The user gives Korean text for a Reel hook (first 3 seconds). Write:
1. English hook — punchy, stops the scroll, speaks to people dreaming of freedom
2. Combo: Korean + English

Rules:
- Under 10 words ideally
- Should make someone think "wait, tell me more"
- Works as on-screen text or spoken line

Return ONLY valid JSON:
{"en": "English hook here", "combo": "한국어 훅\nEnglish hook here"}`
  };

  async function translate() {
    const input = document.getElementById('input').value.trim();
    if (!input) return;

    const btn = document.getElementById('translateBtn');
    const loading = document.getElementById('loading');
    const resultCard = document.getElementById('resultCard');

    btn.disabled = true;
    loading.classList.add('visible');
    resultCard.classList.remove('visible');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPTS[currentMode],
          messages: [{ role: 'user', content: input }]
        })
      });

      const data = await response.json();
      const raw = data.content.map(i => i.text || '').join('');
      
      let result;
      try {
        const clean = raw.replace(/```json|```/g, '').trim();
        result = JSON.parse(clean);
      } catch {
        result = { en: raw, combo: `${input}\n${raw}` };
      }

      document.getElementById('enText').textContent = result.en || '';
      document.getElementById('comboText').textContent = result.combo || '';

      loading.classList.remove('visible');
      resultCard.classList.add('visible');

    } catch (err) {
      loading.classList.remove('visible');
      document.getElementById('enText').textContent = '오류가 발생했어요. 다시 시도해주세요.';
      resultCard.classList.add('visible');
    }

    btn.disabled = false;
  }

  function copyText(id, btn) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'copied ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.metaKey) translate();
  });
</script>
</body>
</html>
